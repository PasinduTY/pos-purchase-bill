<div class="login-container">
  <div class="login-card">
    <h1>Hi</h1>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <span class="icon">✉</span>
        <input type="email" formControlName="email" placeholder="Email*" />
      </div>
      <div
        class="field-error"
        *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
      >
        <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
        <span *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email address.</span>
      </div>

      <div class="form-field">
        <span class="icon">🔑</span>
        <input type="password" formControlName="password" placeholder="Password*" />
      </div>
      <div
        class="field-error"
        *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
      >
        <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
      </div>

      <div class="server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'LOGIN' }}
      </button>
    </form>
  </div>
</div>
